<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Showly</title>
    <link rel="icon" href="/assets/logo.png">
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header img {
            height: 50px;
            margin-bottom: 15px;
        }

        .login-header h2 {
            color: #1a1a1a;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .fa-spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <img src="/assets/logo.png" alt="Showly Logo">
            <h2>Showly Admin</h2>
            <p>Hoş geldiňiz!</p>
        </div>
        <div id="error-message" class="error-message"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Ulanyjy ady</label>
                <input type="text" id="username" placeholder="Ulanyjy adyňyzy ýazyň" required>
            </div>
            <div class="form-group">
                <label for="password">Açar sözi</label>
                <input type="password" id="password" placeholder="Açar sözüňizi ýazyň" required>
            </div>
            <button type="submit" class="btn-login">Giriş</button>
        </form>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const submitBtn = loginForm.querySelector('.btn-login');
            const originalText = submitBtn.innerHTML;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Biraz garaşyň...';
            submitBtn.style.opacity = '0.7';
            errorMessage.style.display = 'none'; // Önceki hata mesajını gizle

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 20000);

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                const payload = await response.json().catch(() => ({}));

                if (!response.ok) {
                    submitBtn.innerHTML = '<i class="fas fa-times-circle"></i> Ýalňyş giriş!';
                    submitBtn.style.background = 'linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)';

                    errorMessage.textContent = payload.message || 'Adyňyz ýada koduňyz ýalňyş!';
                    errorMessage.style.display = 'block';

                    setTimeout(() => {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalText;
                        submitBtn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                        submitBtn.style.opacity = '1';
                    }, 2000);
                    return;
                }

                // ✅ Başarılı giriş
                submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Dogry!';
                submitBtn.style.background = 'linear-gradient(135deg, #2ecc71 0%, #27ae60 100%)';

                // ✅ sessionStorage kullan (sekme kapanınca oturum biter)
                sessionStorage.setItem('adminToken', payload.token);
                sessionStorage.setItem('adminUser', JSON.stringify({
                    id: payload.user.id,
                    username: payload.user.username,
                    role: payload.user.role,
                    permissions: payload.user.permissions || []
                }));

                setTimeout(() => {
                    window.location.href = '/admin';
                }, 800);

            } catch (error) {
                console.error('Giriş näsazlygy:', error.message, error.code);

                let errorText = 'Giriş wagtynda bir hata ýüze çykdy. Täzeden synanyşyň.';
                let btnIcon = 'fa-exclamation-triangle';

                if (error.name === 'AbortError' || error.message === 'TIMEOUT') {
                    errorText = 'Baglanyşyk wagt geçdi (20s). WiFi ýa-da internet baglanyşygyňyzy barlaň we täzeden synanyşyň.';
                    btnIcon = 'fa-clock';
                } else if (
                    error.message.includes('network') ||
                    error.message.includes('offline') ||
                    error.code === 'unavailable'
                ) {
                    errorText = 'Internet baglanyşygy ýok ýa-da server elýeterli däl. WiFi barlaň.';
                    btnIcon = 'fa-wifi';
                } else if (error.message.includes('permission') || error.code === 'permission-denied') {
                    errorText = 'Rugsat hatasy. Administratora habar beriň.';
                    btnIcon = 'fa-lock';
                }

                submitBtn.innerHTML = `<i class="fas ${btnIcon}"></i> Näsazlyk!`;
                submitBtn.style.background = 'linear-gradient(135deg, #e67e22 0%, #d35400 100%)';
                errorMessage.innerHTML = errorText;
                errorMessage.style.display = 'block';

                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                    submitBtn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                    submitBtn.style.opacity = '1';
                }, 4000);
            }
        });
    </script>
</body>

</html>
